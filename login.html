<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - SCMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
    <main class="auth-container-glass">
        <div class="auth-side-art">
            <img src="assets/student.png" alt="Student Art">
            <h2>Track & Resolve</h2>
            <p>Access your student dashboard to file new complaints, view timelines, and check administrative resolution status.</p>
        </div>
        
        <div class="auth-form-side">
            <div class="auth-logo">
                <img src="assets/logo.png" alt="Logo">
                <span>SCMS</span>
            </div>
            
            <h1>Student Login</h1>
            <p class="subtext">Enter your registered email and password to access the portal.</p>
            
            <div id="error-message" class="alert alert-danger" style="display: none;"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-premium" style="width: 100%; margin-top: 10px;" id="btn-submit-login">Log In</button>
            </form>
            
            <div class="auth-link">
                New User? <a href="register.html" id="link-register">Register Account Here</a>
            </div>
            <div class="auth-link" style="margin-top: 10px;">
                <a href="index.html" style="color: var(--color-text-light);">← Back to Portal Page</a>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="js/database.js"></script>
<script>
    // Handle form submit
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');
        
        errorDiv.style.display = 'none';
        
        const response = await db.loginStudent(email, password);
        
        if (response.success) {
            window.location.href = 'dashboard.html';
        } else {
            errorDiv.textContent = response.message || 'Invalid email or password.';
            errorDiv.style.display = 'flex';
        }
    });

    // If already logged in, redirect to dashboard
    if (sessionStorage.getItem('scms_current_user')) {
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
